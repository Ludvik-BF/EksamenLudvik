<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Produktoversikt</title>
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        img { width: 100px; height: auto; }
    </style>
</head>
<body>
    <h1>Våre Produkter</h1>
    
    <table>
        <thead>
            <tr>
                <th>Bilde</th>
                <th>Navn</th>
                <th>Beskrivelse</th>
                <th>Pris</th>
            </tr>
        </thead>
        <tbody>
            <% produkter.forEach(produkt => { %>
                <tr>
                    <td><img src="<%= produkt.bilde_url %>" alt="<%= produkt.navn %>"></td>
                    <td><%= produkt.navn %></td>
                    <td><%= produkt.beskrivelse %></td>
                    <td>kr <%= produkt.pris %></td>
                </tr>
            <% }) %>
        </tbody>
    </table>
</body>
</html>
