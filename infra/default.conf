# nginx default config
# IMPORTANT: replace 10.0.0.0/24 with your company's subnet
server {
  listen 80;
  server_name _;

  # public site
  location / {
    proxy_pass http://web:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # admin - restricted by subnet
  location /admin {
    allow 10.0.0.0/24;    # <-- change this to your company subnet
    deny all;

    proxy_pass http://web:3000/admin.html;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
